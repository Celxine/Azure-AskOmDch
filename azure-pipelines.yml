trigger:
  - main
  - dev
  - feature/e-commerce

pool:
  vmImage: 'ubuntu-latest'

steps:
  - task: JavaToolInstaller@1
    inputs:
      versionSpec: '25'
      jdkArchitectureOption: 'x64'
      jdkSourceOption: 'PreInstalled'

  - task: CmdLine@2
    inputs:
     script: 'mvn clean test'

  # Step 3: Publish JUnit Test Results
  - task: PublishTestResults@2
    displayName: 'Publish JUnit Test Results'
    condition: succeededOrFailed()
    inputs:
      testResultsFormat: 'JUnit'
      testResultsFiles: '**/surefire-reports/TEST-*.xml'

  # Step 4: Publish Cucumber HTML Report
  - task: PublishPipelineArtifact@1
    displayName: 'Publish Cucumber HTML Report'
    condition: always()
    inputs:
      targetPath: '$(System.DefaultWorkingDirectory)/target/cucumber-html-reports'
      artifact: 'Cucumber-HTML-Report'
      publishLocation: 'pipeline'